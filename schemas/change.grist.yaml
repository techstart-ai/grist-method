# OpenSpec change proposal schema — replaces the 4-file
# (proposal.md + design.md + tasks.md + specs/) layout with a single YAML.
# Filename: openspec/changes/<change-id>/change.grist.yaml
# Authoring: agent emits this in /grist iterate mode.

change: <kebab-id>                # required, e.g. add-okta-mfa
spec: <feature-slug>              # required, the spec being changed (matches openspec/specs/<feature>/)
status: proposed|approved|implementing|done|withdrawn
why: <one-line motivation>        # what triggered this change

# Spec deltas — the contract. Three operations.
delta:
  add:                            # new requirements
    - id: req-N                   # new req id, monotonic in feature
      req: SHALL <statement>
      scenarios:
        - <one-line scenario>
  modify:                         # changed requirements
    - id: <existing-req-id>       # ref to spec#<feature>#<req-id>
      from: <one-line current>
      to: <one-line new>
      reason: <one-line>
  remove:                         # deleted requirements
    - id: <existing-req-id>
      reason: <one-line>

# Design — replaces design.md prose
design:
  approach: <one-line chosen approach>
  alts:                           # rejected alternatives, one line each
    - option: <one-line>
      rejected: <reason>
  affects:                        # which arch components this touches
    - arch#C1
    - arch#C2

# Tasks — replaces tasks.md
tasks:
  - id: t1
    do: <one-line action>
    files: [<path: new|modify>]   # optional

# Risks specific to this change (not the whole spec)
risks:
  - id: cr1
    risk: <one-line>
    mitigation: <one-line>

# Migration — only if change requires data/state migration
migration:
  required: true|false
  steps:                          # only if required
    - <one-line step>
  rollback: <one-line>

