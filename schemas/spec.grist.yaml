# Capability spec schema — replaces OpenSpec's openspec/specs/<capability>/spec.md
# Filename: openspec/specs/<capability>/spec.grist.yaml
# Long-lived. Re-read by every change proposal as upstream context.
#
# Distinct from change.grist.yaml (short-lived, per-change-folder).
# Distinct from prd.grist.yaml (BMAD product spec, not capability spec).

spec: <capability-slug>           # required, kebab-case, matches folder name
version: <semver>                 # optional, bumped on each archive merge
status: active|deprecated         # default active

purpose: <one-line, ≤200 chars>   # what this capability does

requirements:
  - id: req-1                     # required, monotonic per spec
    req: SHALL <statement>        # use SHALL/MUST for normative requirements
    scenarios:                    # one or more scenarios per req
      - id: s1                    # optional id for cross-referencing
        when: <trigger condition>
        then: <expected outcome>
    notes: []                     # optional, one-line each

  - id: req-2
    req: MUST <statement>
    scenarios:
      - when: <>
        then: <>

# History — appended on each archive merge. Optional but useful for traceability.
history:
  - change: <change-id>           # ref to openspec/changes/archive/<date>-<change-id>/
    date: <YYYY-MM-DD>
    delta: added req-N, modified req-M, removed req-K

# --- Filled example ---
