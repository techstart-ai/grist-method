name: Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Run BMAD Claude Code Smoke Test
      run: ./test/smoke-test.sh
      
    - name: Run OpenSpec Claude Code Smoke Test
      run: ./test/smoke-test-openspec.sh

    - name: Run Gristats CLI Checks
      run: |
        python3 gristats/gristats.py project examples/auth-v2/
        python3 converters/bmad-prd-to-grist.py examples/auth-v2/PRD.md > /tmp/check.yaml
