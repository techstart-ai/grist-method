# Review findings schema — replaces the markdown-bullet "Review Findings"
# section that bmad-code-review appends to story files.
# Filename: review-<story_key>.grist.yaml (one per review pass)
# Authoring: bmad-code-review on_complete hook emits this. Also referenced
# by future review passes so prior findings are addressable without
# re-reading the prose story.

review: <story_key>                # required, matches the story (e.g. S1.1 or 1-2-user-auth)
story: prd#<slug>#<story_key>      # ref to story
date: <YYYY-MM-DD>
mode: full|no-spec                 # matches bmad-code-review's review_mode
diff_source: <ref>                 # branch, commit range, PR url, or "uncommitted"
spec: <path or null>               # spec file used by Acceptance Auditor (prefer .grist.yaml)

# Layers that ran. Non-running layers go in `failed_layers`.
layers_ran: [blind, edge, auditor]
failed_layers: []                  # one of [blind, edge, auditor], empty if none failed

# Findings — flat list, post-triage. Each has id, classification, location, one-line title + detail.
findings:
  - id: f1                         # required, sequential
    class: patch|decision-needed|defer|dismiss   # required, post-triage classification
    severity: low|med|high|crit    # optional, agent-judged
    source: blind|edge|auditor|<merged>   # which layer raised it (e.g. "blind+edge")
    loc: <path:line>               # required if known
    title: <one-line>              # required
    detail: <one-line>             # required, ≤200 chars
    fix: <one-line>                # required for patch, optional otherwise
    ac_ref: ac<n>                  # optional, only for auditor findings — which AC violated

# Counts for summary
counts:
  decision_needed: 0
  patch: 0
  defer: 0
  dismissed: 0

# Resolution tracking — populated as findings are addressed
resolutions:
  - finding: f1
    status: pending|resolved|deferred|wontfix
    resolved_in: <commit-sha or null>
    note: <one-line, optional>

